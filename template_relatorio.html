<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BiostatsIA - Dossiê Comparativo</title>
    <style>
        :root { --primary: #008080; --secondary: #2f4f4f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 40px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { border-bottom: 3px solid var(--primary); padding-bottom: 20px; margin-bottom: 40px; }
        
        .exame-container { 
            display: flex; 
            gap: 30px; 
            background: #ffffff; 
            padding: 10px;
            margin-bottom: 20px;
            align-items: flex-start;
        }
        .exame-image { 
            flex: 0 0 350px; 
            position: sticky;
            top: 20px;
        }
        .exame-image img { 
            width: 100%; 
            border-radius: 8px; 
            border: 1px solid #ddd;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .exame-laudo { 
            flex: 1;
            padding-left: 20px;
            border-left: 1px solid #eee;
        }
        
        h2 { color: var(--secondary); margin-top: 0; font-size: 20px; }
        .badge-benigno { background: #e8f5e9; color: #2e7d32; padding: 4px 12px; border-radius: 15px; font-weight: bold; font-size: 12px; }
        .badge-maligno { background: #ffebee; color: #c62828; padding: 4px 12px; border-radius: 15px; font-weight: bold; font-size: 12px; }
        hr { border: 0; border-top: 2px dashed #eee; margin: 50px 0; }
        
        /* Estilo para listas dentro do laudo */
        ul { padding-left: 20px; }
        li { margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BIOSTATSIA | Dossiê de Análise Radiômica</h1>
            <p><strong>Engenharia de IA Aplicada:</strong> Comparativo de biomarcadores em ultrassom mamário.</p>
        </div>
        <div class="content">
            {{LAUDO_FINAL_AQUI}}
        </div>
    </div>
</body>
</html>
